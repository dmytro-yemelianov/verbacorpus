name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Avoid overlapping deploys when pushes land quickly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default — no job needs more than read (deploy authenticates
# to Cloudflare with its own API token, not GITHUB_TOKEN).
permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: node build.mjs
      - run: npx vitest run

  pytest:
    name: Data pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  deploy:
    name: Deploy to Cloudflare
    needs: [test, pytest]
    # Only deploy real pushes to main — never PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # build.mjs regenerates public/app.js (gitignored), chrome.js and embroidery.css.
      - run: node build.mjs
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          # Pin to a version that supports wrangler.jsonc (the action defaults to an
          # older wrangler that predates it → "Missing entry-point").
          wranglerVersion: "4.103.0"
          command: deploy
