name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Avoid overlapping deploys when pushes land quickly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: node build.mjs
      - run: npx vitest run

  deploy:
    name: Deploy to Cloudflare
    needs: test
    # Only deploy real pushes to main — never PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # build.mjs regenerates public/app.js (gitignored), chrome.js and embroidery.css.
      - run: node build.mjs
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          # Pin to a version that supports wrangler.jsonc (the action defaults to an
          # older wrangler that predates it → "Missing entry-point").
          wranglerVersion: "4.103.0"
          command: deploy
